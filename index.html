<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPUB Reader</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

  :root {
    --bg: #253238;
    --page-bg: #273841;
    --text: #d4cfc8;
    --text-muted: #7a8a90;
    --accent: #c8823a;
    --border: #344a52;
    --shadow: rgba(0, 0, 0, 0.35);
    --font-size: 18px;
    --page-width: 680px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: var(--font-size);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── TOP BAR ── */
  #topbar {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    gap: 12px;
  }

  #book-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: var(--text-muted);
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 300px;
  }

  .topbar-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    height: 34px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: all 0.15s;
    padding: 0 10px;
    white-space: nowrap;
    font-family: 'EB Garamond', serif;
  }
  .icon-btn:hover { background: var(--border); color: var(--text); }
  .icon-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  #font-size-display {
    font-size: 12px;
    color: var(--text-muted);
    min-width: 28px;
    text-align: center;
  }

  /* ── LAYOUT ── */
  #main {
    display: flex;
    width: 100%;
    max-width: 900px;
    flex: 1;
    gap: 0;
    position: relative;
  }

  /* ── TOC SIDEBAR ── */
  #toc-panel {
    width: 0;
    min-width: 0;
    background: var(--bg);
    border: 0px solid var(--border);
    border-radius: 10px 0 0 10px;
    padding: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.25s ease, min-width 0.25s ease, padding 0.25s ease, border-width 0.25s ease;
    flex-shrink: 0;
    max-height: 75vh;
    position: sticky;
    top: 0;
  }
  #toc-panel.open {
    width: 240px;
    min-width: 240px;
    padding: 20px 0;
    border-width: 1px;
  }

  #toc-panel h3 {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0 20px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    white-space: nowrap;
  }

  #toc-list {
    overflow-y: auto;
    flex: 1;
  }
  #toc-list::-webkit-scrollbar { width: 3px; }
  #toc-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .toc-item {
    padding: 8px 20px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text);
    line-height: 1.4;
    transition: background 0.1s;
    border-left: 3px solid transparent;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .toc-item:hover { background: rgba(200,130,58,0.08); }
  .toc-item.active { border-left-color: var(--accent); color: var(--accent); font-weight: 500; }

  /* ── BOOK AREA ── */
  #book-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px 40px;
  }

  /* ── DROP ZONE ── */
  #drop-zone {
    width: 100%;
    max-width: var(--page-width);
    min-height: 500px;
    border: 2px dashed var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 20px;
    background: var(--page-bg);
  }
  #drop-zone:hover, #drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(200,130,58,0.04);
  }
  #drop-zone .drop-icon { font-size: 48px; opacity: 0.3; }
  #drop-zone h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--text);
    font-weight: 400;
  }
  #drop-zone p { font-size: 14px; color: var(--text-muted); }
  #file-input { display: none; }

  /* ── PAGE ── */
  #page-container {
    display: none;
    width: 100%;
    max-width: var(--page-width);
    position: relative;
  }

  #page {
    background: var(--page-bg);
    border: 1px solid var(--border);
    border-radius: 4px 10px 10px 4px;
    box-shadow:
      4px 4px 20px var(--shadow),
      -3px 0 0 #222e34,
      -6px 0 0 #1e292f;
    padding: 64px 72px;
    min-height: 600px;
    line-height: 1.85;
    position: relative;
    overflow: hidden;
  }

  #page-content h1, #page-content h2, #page-content h3 {
    font-family: 'Playfair Display', serif;
    margin: 1.5em 0 0.6em;
    line-height: 1.3;
    color: var(--text);
  }
  #page-content h1 { font-size: 1.6em; }
  #page-content h2 { font-size: 1.3em; }
  #page-content h3 { font-size: 1.1em; }

  #page-content p {
    margin-bottom: 0.9em;
    text-align: justify;
    hyphens: auto;
  }
  #page-content p + p { text-indent: 1.5em; }

  #page-content img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 1em auto;
    border-radius: 4px;
    transition: filter 0.2s;
  }

  #page-content.invert-images img {
    filter: invert(1) contrast(0.65);
  }

  #page-content a { color: var(--accent); text-decoration: none; }
  #page-content blockquote {
    border-left: 3px solid var(--accent);
    margin: 1em 0;
    padding: 0.5em 1em;
    color: var(--text-muted);
    font-style: italic;
  }

  #page::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 40px; height: 40px;
    background: linear-gradient(225deg, var(--bg) 45%, var(--border) 50%, var(--page-bg) 55%);
    border-radius: 4px 0 10px 0;
    pointer-events: none;
  }

  /* ── NAVIGATION ── */
  #nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: var(--page-width);
    padding: 16px 4px 0;
  }

  .nav-btn {
    background: var(--page-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 24px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-btn:hover:not(:disabled) {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  #page-info {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
  }
  #page-info .chapter-name {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 12px;
    display: block;
    margin-top: 2px;
  }

  #progress-bar {
    width: 100%;
    max-width: var(--page-width);
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 12px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  @keyframes pageIn {
    from { opacity: 0; transform: translateX(8px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .page-turn { animation: pageIn 0.18s ease; }
</style>
</head>
<body>

<div id="topbar">
  <div id="book-title">No book loaded</div>
  <div class="topbar-controls">
    <button class="icon-btn" id="toc-btn" title="Chapters (⌘.)">☰ Chapters</button>
    <button class="icon-btn" id="font-down">A−</button>
    <span id="font-size-display">18</span>
    <button class="icon-btn" id="font-up">A+</button>
    <button class="icon-btn" id="invert-btn" title="Invert images (⌘⇧I)">⬛ Invert imgs</button>
  </div>
</div>

<div id="main">
  <div id="toc-panel">
    <h3>Chapters</h3>
    <div id="toc-list"></div>
  </div>

  <div id="book-area">
    <input type="file" id="file-input" accept=".epub">

    <div id="drop-zone">
      <div class="drop-icon">📖</div>
      <h2>Open an EPUB</h2>
      <p>Drop a file here, or click to browse</p>
    </div>

    <div id="page-container">
      <div id="page">
        <div id="page-content"></div>
      </div>
      <div id="nav-bar">
        <button class="nav-btn" id="prev-btn">← Prev</button>
        <div id="page-info">
          <span id="page-num"></span>
          <span class="chapter-name" id="chapter-name"></span>
        </div>
        <button class="nav-btn" id="next-btn">Next →</button>
      </div>
      <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
  </div>
</div>

<script>
let pages = [];
let currentPage = 0;
let bookId = null;
let fontSize = 18;
let tocItems = [];
let invertImages = false;

const STORAGE_KEY = 'epub_reader_state';

const dropZone      = document.getElementById('drop-zone');
const fileInput     = document.getElementById('file-input');
const pageContainer = document.getElementById('page-container');
const pageContent   = document.getElementById('page-content');
const pageNum       = document.getElementById('page-num');
const chapterName   = document.getElementById('chapter-name');
const prevBtn       = document.getElementById('prev-btn');
const nextBtn       = document.getElementById('next-btn');
const progressFill  = document.getElementById('progress-fill');
const tocPanel      = document.getElementById('toc-panel');
const tocList       = document.getElementById('toc-list');
const bookTitle     = document.getElementById('book-title');
const tocBtn        = document.getElementById('toc-btn');
const fontUp        = document.getElementById('font-up');
const fontDown      = document.getElementById('font-down');
const fontDisplay   = document.getElementById('font-size-display');
const invertBtn     = document.getElementById('invert-btn');

// ── IMAGE INVERT ──
function toggleInvert() {
  invertImages = !invertImages;
  pageContent.classList.toggle('invert-images', invertImages);
  invertBtn.classList.toggle('active', invertImages);
  localStorage.setItem('epub_invert', invertImages ? '1' : '0');
}
if (localStorage.getItem('epub_invert') === '1') {
  invertImages = true;
  pageContent.classList.add('invert-images');
  invertBtn.classList.add('active');
}
invertBtn.addEventListener('click', toggleInvert);

// ── TOC TOGGLE ──
function toggleToc() {
  tocPanel.classList.toggle('open');
  tocBtn.classList.toggle('active', tocPanel.classList.contains('open'));
}
tocBtn.addEventListener('click', toggleToc);

// ── FONT SIZE ──
function applyFontSize() {
  document.documentElement.style.setProperty('--font-size', fontSize + 'px');
  fontDisplay.textContent = fontSize;
  localStorage.setItem('epub_font', fontSize);
}
const savedFont = parseInt(localStorage.getItem('epub_font'));
if (savedFont) { fontSize = savedFont; applyFontSize(); }
fontUp.addEventListener('click',   () => { if (fontSize < 28) { fontSize++; applyFontSize(); } });
fontDown.addEventListener('click', () => { if (fontSize > 12) { fontSize--; applyFontSize(); } });

// ── DROP / FILE ──
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.epub')) loadEpub(file);
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadEpub(e.target.files[0]);
});

// ── LOAD EPUB ──
async function loadEpub(file) {
  try {
    const zip = await JSZip.loadAsync(file);
    const containerXml = await zip.file('META-INF/container.xml').async('string');
    const parser = new DOMParser();
    const containerDoc = parser.parseFromString(containerXml, 'application/xml');
    const opfPath = containerDoc.querySelector('rootfile').getAttribute('full-path');
    const opfDir = opfPath.includes('/') ? opfPath.substring(0, opfPath.lastIndexOf('/') + 1) : '';

    const opfXml = await zip.file(opfPath).async('string');
    const opfDoc = parser.parseFromString(opfXml, 'application/xml');

    const titleEl = opfDoc.querySelector('title');
    const title = titleEl ? titleEl.textContent : file.name.replace('.epub','');
    bookTitle.textContent = title;
    bookId = title.replace(/\s+/g, '_').toLowerCase();

    const spineItems = [...opfDoc.querySelectorAll('spine itemref')].map(i => i.getAttribute('idref'));
    const manifest = {};
    opfDoc.querySelectorAll('manifest item').forEach(item => {
      manifest[item.getAttribute('id')] = { href: item.getAttribute('href'), mediaType: item.getAttribute('media-type') };
    });

    let tocMap = {};
    const ncxId = opfDoc.querySelector('spine')?.getAttribute('toc');
    if (ncxId && manifest[ncxId]) {
      try {
        const ncxXml = await zip.file(opfDir + manifest[ncxId].href).async('string');
        const ncxDoc = parser.parseFromString(ncxXml, 'application/xml');
        ncxDoc.querySelectorAll('navPoint').forEach(np => {
          const label = np.querySelector('navLabel text')?.textContent?.trim() || '';
          const src   = np.querySelector('content')?.getAttribute('src') || '';
          tocMap[src.split('#')[0]] = label;
        });
      } catch(e) {}
    }

    pages = [];
    tocItems = [];
    const imageCache = {};

    for (const [path, zipFile] of Object.entries(zip.files)) {
      if (/\.(png|jpg|jpeg|gif|svg|webp)$/i.test(path)) {
        try {
          const data = await zipFile.async('base64');
          const ext = path.split('.').pop().toLowerCase();
          const mime = ext === 'svg' ? 'image/svg+xml' : `image/${ext === 'jpg' ? 'jpeg' : ext}`;
          imageCache[path] = `data:${mime};base64,${data}`;
          imageCache[path.split('/').pop()] = imageCache[path];
        } catch(e) {}
      }
    }

    for (const idref of spineItems) {
      const item = manifest[idref];
      if (!item || !item.mediaType?.includes('html')) continue;
      const chapterFile = zip.file(opfDir + item.href) || zip.file(item.href);
      if (!chapterFile) continue;

      const html = await chapterFile.async('string');
      const doc = parser.parseFromString(html, 'text/html');

      doc.querySelectorAll('img').forEach(img => {
        const src = img.getAttribute('src') || '';
        img.src = imageCache[opfDir + src] || imageCache[src.split('/').pop()] || '';
      });
      doc.querySelectorAll('script, style').forEach(el => el.remove());

      const body = doc.body;
      if (!body || !body.innerHTML.trim()) continue;

      const chapterTitle = tocMap[item.href] || tocMap[item.href.split('/').pop()] ||
        doc.querySelector('h1,h2,h3')?.textContent?.trim() || '';

      pages.push({ html: body.innerHTML, chapterTitle, chapterId: idref });
      if (chapterTitle) tocItems.push({ title: chapterTitle, pageIndex: pages.length - 1 });
    }

    if (pages.length === 0) { alert('Could not parse this EPUB.'); return; }

    renderToc();

    const savedState = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    currentPage = Math.min(savedState[bookId] || 0, pages.length - 1);

    dropZone.style.display = 'none';
    pageContainer.style.display = 'block';
    renderPage();

  } catch(err) {
    console.error(err);
    alert('Failed to load EPUB: ' + err.message);
  }
}

// ── RENDER TOC ──
function renderToc() {
  tocList.innerHTML = '';
  tocItems.forEach(item => {
    const el = document.createElement('div');
    el.className = 'toc-item';
    el.textContent = item.title;
    el.addEventListener('click', () => {
      currentPage = item.pageIndex;
      savePosition();
      renderPage();
      tocPanel.classList.remove('open');
      tocBtn.classList.remove('active');
    });
    tocList.appendChild(el);
  });
}

// ── RENDER PAGE ──
function renderPage() {
  const p = pages[currentPage];
  pageContent.innerHTML = p.html;
  pageContent.classList.toggle('invert-images', invertImages);

  window.scrollTo(0, 0);
  pageContent.classList.remove('page-turn');
  void pageContent.offsetWidth;
  pageContent.classList.add('page-turn');

  prevBtn.disabled = currentPage === 0;
  nextBtn.disabled = currentPage === pages.length - 1;

  pageNum.textContent = `${currentPage + 1} / ${pages.length}`;
  chapterName.textContent = p.chapterTitle || '';

  const pct = pages.length > 1 ? (currentPage / (pages.length - 1)) * 100 : 100;
  progressFill.style.width = pct + '%';

  tocList.querySelectorAll('.toc-item').forEach((el, i) => {
    el.classList.toggle('active', tocItems[i]?.pageIndex === currentPage);
  });

  savePosition();
}

// ── NAVIGATION ──
prevBtn.addEventListener('click', () => { if (currentPage > 0) { currentPage--; renderPage(); } });
nextBtn.addEventListener('click', () => { if (currentPage < pages.length - 1) { currentPage++; renderPage(); } });

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', e => {
  // Cmd+. → toggle TOC
  if ((e.metaKey || e.ctrlKey) && e.key === '.') {
    e.preventDefault();
    toggleToc();
    return;
  }
  // Cmd+Shift+I → toggle invert
  if (e.metaKey && e.altKey && e.ctrlKey && e.key === 'i') {
    e.preventDefault();
    toggleInvert();
    return;
  }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextBtn.click();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prevBtn.click();
});

// ── SAVE POSITION ──
function savePosition() {
  if (!bookId) return;
  const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  state[bookId] = currentPage;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
</script>
</body>
</html>
